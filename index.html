<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>대전 LGES · TOS 진행관리 웹앱</title>
<style>
:root{
 --acc:#4f46e5;--acc-soft:#eef2ff;--acc-bd:#c7d2fe;
 --bg:#f6f7fb;--surface:#ffffff;--bd:#e5e7eb;--bd2:#eef0f4;
 --fg:#111827;--mut:#6b7280;--mut2:#9ca3af;
 --s1:#9ca3af;--s2:#8b5cf6;--s3:#0ea5e9;--s4:#f59e0b;--s5:#ef4444;--s6:#10b981;
 --r:12px;--r2:9px;--shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:Pretendard,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit}
/* ===== 레이아웃: 좌측 사이드바 ===== */
.shell{display:flex;min-height:100vh}
.sidebar{width:236px;flex:0 0 236px;background:var(--surface);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{padding:18px 18px 14px}
.brand .logo{display:flex;align-items:center;gap:9px}
.brand .mark{width:30px;height:30px;border-radius:8px;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:-.5px}
.brand h1{font-size:14.5px;margin:0;font-weight:750;letter-spacing:-.2px}
.brand .sub{font-size:11px;color:var(--mut2);margin-top:7px;line-height:1.4}
.nav-sec{padding:6px 12px;font-size:11px;font-weight:700;color:var(--mut2);letter-spacing:.4px;text-transform:uppercase;margin-top:8px}
nav#nav{display:flex;flex-direction:column;gap:2px;padding:4px 10px 14px}
nav#nav button{display:flex;align-items:center;gap:9px;border:none;background:none;padding:9px 11px;font-size:13.5px;cursor:pointer;color:#374151;border-radius:9px;text-align:left;width:100%;font-weight:550;transition:.12s}
nav#nav button:hover{background:#f3f4f6}
nav#nav button.on{background:var(--acc-soft);color:var(--acc);font-weight:700}
nav#nav button.adm{color:#9a6a14}
nav#nav button.adm.on{background:#fff7ed;color:#b45309}
/* ===== 콘텐츠 ===== */
.content{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd);padding:11px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.topbar .pageT{font-size:15px;font-weight:700;letter-spacing:-.2px}
.topbar .spacer{flex:1}
.role{font-size:12px;color:var(--mut);background:#f3f4f6;padding:5px 11px;border-radius:999px;font-weight:600}
.role.adm{background:var(--acc-soft);color:var(--acc)}
main#view{padding:22px;max-width:1240px;width:100%;margin:0 auto}
/* ===== 버튼 ===== */
.btn{cursor:pointer;border:1px solid var(--bd);background:#fff;color:var(--fg);padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;transition:.12s}
.btn:hover{background:#f9fafb;border-color:#d1d5db}
.btn.pri{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn.pri:hover{background:#4338ca;border-color:#4338ca}
.btn.dng{background:#fff;color:#dc2626;border-color:#fbcaca}
.btn.dng:hover{background:#fef2f2}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
/* ===== 카드 ===== */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(124px,1fr));gap:11px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:14px 15px;cursor:pointer;transition:.14s;box-shadow:var(--shadow)}
.card:hover{border-color:var(--acc-bd);transform:translateY(-1px)}
.card.on{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
.card .lab{font-size:12px;color:var(--mut);font-weight:600}
.card .num{font-size:27px;font-weight:800;margin-top:5px;letter-spacing:-1px}
/* ===== 태그 ===== */
.tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;color:#fff;white-space:nowrap;font-weight:600}
.t1{background:var(--s1)}.t2{background:var(--s2)}.t3{background:var(--s3)}.t4{background:var(--s4)}.t5{background:var(--s5)}.t6{background:var(--s6)}
/* ===== 패널/표 ===== */
.panel{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel h2{font-size:15.5px;margin:0 0 12px;font-weight:750;letter-spacing:-.2px}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
th,td{border-bottom:1px solid var(--bd2);padding:9px 10px;text-align:left;vertical-align:top}
th{background:#fafbfc;font-weight:650;color:#4b5563;font-size:12px;letter-spacing:.1px;position:sticky;top:0}
tbody tr:last-child td{border-bottom:none}
tr.clk{cursor:pointer}
tr.clk:hover td{background:#fafaff}
.tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--bd);border-radius:9px;padding:8px 10px;color:var(--fg);background:#fff;transition:.12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
textarea{width:100%;resize:vertical;min-height:46px}
input[type=text],input[type=number],input[type=date],input[type=month],input[type=search]{min-width:120px}
.num-r,.right{text-align:right}
.mut{color:var(--mut)}
/* ===== 모달 ===== */
.modal-bg{position:fixed;inset:0;background:rgba(17,24,39,.45);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;padding:30px;z-index:50;overflow:auto}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:16px;max-width:780px;width:100%;padding:24px;box-shadow:0 20px 50px rgba(16,24,40,.18)}
.modal h3{margin:0 0 14px;font-size:17px;font-weight:750}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:9px}
.fld label{font-size:12px;color:var(--mut);font-weight:600}
.note{background:var(--acc-soft);border:1px solid var(--acc-bd);color:#3730a3;padding:9px 12px;border-radius:9px;font-size:12.5px;margin-bottom:12px;line-height:1.5}
.ok{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;padding:9px 12px;border-radius:9px;font-size:12.5px;margin-bottom:10px}
.drop{border:2px dashed var(--bd);border-radius:12px;padding:30px;text-align:center;color:var(--mut);cursor:pointer}
.drop.over{border-color:var(--acc);background:var(--acc-soft);color:var(--acc)}
.hide{display:none!important}
/* ===== 진행현황 3단 ===== */
.dashwrap{display:grid;grid-template-columns:250px minmax(0,1fr) 312px;gap:14px;align-items:start}
.side{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:15px;box-shadow:var(--shadow)}
.side h2{font-size:13.5px;margin:0 0 12px;display:flex;align-items:center;gap:7px;font-weight:750}
.side h2 .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-n{background:#f59e0b}.dot-q{background:#0ea5e9}
.notice{border:1px solid var(--bd);background:#fafbfc;border-radius:10px;padding:11px 12px;margin-bottom:9px;font-size:12.5px;line-height:1.55;color:#374151;position:relative}
.notice.pin{border-color:var(--acc-bd);background:var(--acc-soft);color:#3730a3;font-weight:600}
.notice .nt-d{font-size:10.5px;color:var(--mut2);margin-top:6px}
.notice .nt-x{position:absolute;top:8px;right:9px;cursor:pointer;color:var(--mut2);font-weight:700;font-size:14px;line-height:1}
.notice .nt-x:hover{color:#dc2626}
.inq{border:1px solid var(--bd);border-radius:10px;padding:11px 12px;margin-bottom:9px;font-size:12.5px;line-height:1.55;background:#fff}
.inq .iq-h{display:flex;justify-content:space-between;gap:6px;align-items:center;margin-bottom:4px}
.inq .iq-who{font-weight:700}
.inq .iq-eq{color:var(--mut);font-size:11px}
.inq .iq-msg{white-space:pre-wrap;word-break:break-word;color:#374151}
.inq .iq-ans{margin-top:7px;border-top:1px dashed var(--bd);padding-top:7px;color:#065f46;background:#ecfdf5;border-radius:8px;padding:8px 9px}
.inq .iq-ans b{color:#047857}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:999px;color:#fff;font-weight:600;vertical-align:middle}
.bd-w{background:#f59e0b}.bd-d{background:#10b981}
.side .fld{margin-bottom:7px}
.side input,.side textarea{width:100%;min-width:0}
.side textarea{min-height:56px}
/* ===== 결과보고서 전표 ===== */
.rpt{border:1px solid var(--bd);border-radius:12px;margin:0 0 22px;overflow:hidden;box-shadow:var(--shadow)}
.rpt-h{background:#1e1b4b;color:#fff;text-align:center;padding:16px}
.rpt-h .t{font-size:20px;font-weight:800;letter-spacing:5px}
.rpt-h .s{font-size:12px;color:#c7d2fe;margin-top:4px}
.rpt-meta{display:flex;justify-content:space-between;background:#f5f3ff;padding:8px 14px;font-size:12px;color:#5b21b6;border-bottom:1px solid var(--bd)}
.rpt table{font-size:13px}
.rpt th{background:#faf9ff;width:120px;white-space:nowrap}
.rpt td{min-height:20px}
@media print{
 .sidebar,.topbar,.tools,.no-print,.modal-bg{display:none!important}
 main#view{max-width:none;padding:0}
 .content{display:block}
 .rpt{page-break-inside:avoid;margin-bottom:14px;box-shadow:none}
}
@media(max-width:1080px){
 .dashwrap{grid-template-columns:1fr}
 .sidebar{width:200px;flex-basis:200px}
}
@media(max-width:760px){
 .shell{flex-direction:column}
 .sidebar{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center}
 nav#nav{flex-direction:row;flex-wrap:wrap}
 nav#nav button{width:auto}
 .brand{padding:12px 16px}
}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">
        <div class="mark">T</div>
        <h1>TOS 진행관리</h1>
      </div>
      <div class="sub">대전 LGES · 원익피앤이<br>충방전기 고장 접수·점검·정산</div>
    </div>
    <div class="nav-sec">메뉴</div>
    <nav id="nav"></nav>
  </aside>
  <div class="content">
    <div class="topbar">
      <div class="pageT" id="pageT">진행현황</div>
      <div class="spacer"></div>
      <span class="role" id="roleLab">조회 전용 사용자</span>
      <button class="btn sm" id="loginBtn">관리자 로그인</button>
    </div>
    <main id="view"></main>
  </div>
</div>

<div class="modal-bg" id="mbg"><div class="modal" id="mbox"></div></div>

function renderNav(){
 const n=document.getElementById('nav');n.innerHTML='';
 TABS.forEach(t=>{
   if(t.adm && !isAdmin) return;
   const b=document.createElement('button');
   b.textContent=(t.adm?'✎ ':'')+t.name;
   b.className=(t.adm?'adm ':'')+(curTab===t.id?'on':'');
   b.onclick=()=>{curTab=t.id;dashFilter=null;render();};
   n.appendChild(b);
 });
}
function render(){renderNav();const v=document.getElementById('view');
 if(curTab==='dash')v.innerHTML=viewDash();
 else if(curTab==='report')renderReport(v);
 else if(curTab==='settle')renderSettle(v);
 else if(curTab==='req')renderReq(v);
 else if(curTab==='done')renderDone(v);
 else if(curTab==='eng')renderEng(v);
 else if(curTab==='tos')renderTos(v);
 const rl=document.getElementById('roleLab');
 rl.textContent=isAdmin?'관리자 · 수정 권한':'조회 전용 사용자';
 rl.className='role'+(isAdmin?' adm':'');
 const tb=TABS.find(t=>t.id===curTab);
 const pt=document.getElementById('pageT');if(pt&&tb)pt.textContent=tb.name;
}

//============ 공통 escape ============
function esc(s){if(s==null)return '';return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function won(n){n=Number(n)||0;return n.toLocaleString('ko-KR');}

function viewDash(){
 const cnt={}; STAGES.forEach(s=>cnt[s]=0);
 DB.forEach(q=>{if(cnt[q.stage]!=null)cnt[q.stage]++;});
 let cards='<div class="cards">';
 cards+='<div class="card '+(dashFilter==null?'on':'')+'" onclick="setDash(null)"><div class="lab">총 접수</div><div class="num">'+DB.length+'</div></div>';
 STAGES.forEach((s,i)=>{cards+='<div class="card '+(dashFilter===s?'on':'')+'" onclick="setDash(\''+s+'\')"><div class="lab"><span class="tag t'+(i+1)+'">'+esc(s)+'</span></div><div class="num">'+cnt[s]+'</div></div>';});
 cards+='</div>';
 const center=cards+
  '<div class="panel"><div class="tools"><input type="search" id="dashKw" placeholder="신고자·장비·내용 검색" oninput="dashSearch()">'+
  '<span id="dashFi">'+(dashFilter?'<span class="mut">필터: <b>'+esc(dashFilter)+'</b></span> <button class="btn sm" onclick="setDash(null)">전체보기</button>':'')+'</span>'+

 return '<div class="dashwrap"><div>'+noticePanel()+'</div><div>'+center+'</div><div>'+inqPanel()+'</div></div>';
}
//============ 좌측 알림창 ============
function noticePanel(){
 let h='<div class="side"><h2><span class="dot dot-n"></span>알림</h2>';
 const list=NOTICES.slice().sort((a,b)=>(b.pin?1:0)-(a.pin?1:0));
 list.forEach(n=>{
   h+='<div class="notice'+(n.pin?' pin':'')+'">'+
      (isAdmin&&!n.pin?'<span class="nt-x" title="삭제" onclick="delNotice(\''+n.id+'\')">×</span>':'')+
      esc(n.text)+
      (n.date?'<div class="nt-d">'+esc(n.date)+'</div>':'')+'</div>';
 });
 if(isAdmin){
   h+='<div class="fld" style="margin-top:10px"><label>새 알림 등록 (관리자)</label>'+
      '<textarea id="ntInput" placeholder="공지할 내용을 입력하세요"></textarea></div>'+
      '<button class="btn pri sm" style="width:100%" onclick="addNotice()">알림 등록</button>';
 }
 h+='</div>';
 return h;
}
function addNotice(){
 const el=document.getElementById('ntInput');const t=(el.value||'').trim();
 if(!t){alert('알림 내용을 입력하세요.');return;}
 NOTICES.push({id:'N'+Date.now(),text:t,date:nowStr(),pin:false});
 persist();render();
}
function delNotice(id){
 if(!confirm('이 알림을 삭제할까요?'))return;
 NOTICES=NOTICES.filter(n=>n.id!==id);persist();render();
}

//============ 월정산 (일자 조회, 21~20일, 완료건만) ============
function defRange(){
 const t=new Date();let y=t.getFullYear(),m=t.getMonth();// 0-based
 // 정산월 기본 = 다음달, 기간 = 전월21 ~ 당월20 기준. 단순화: 이번달20 마감, 시작 전월21
 const end=new Date(y,m,20), start=new Date(y,m-1,21);
 return {start:fmt(start),end:fmt(end)};
}
function fmt(d){return d.toISOString().slice(0,10);}
function renderSettle(v){
 const r=defRange();
 v.innerHTML='<div class="panel"><h2>월정산 · 일자 조회</h2>'+
  '<div class="note">정산 대상: <b>수리완료(⑥완료) 건</b> · 정산 기간 기본값은 <b>전월 21일 ~ 당월 20일</b>입니다. 날짜를 바꿔 조회할 수 있습니다.</div>'+
  '<div class="tools">정산월 <input type="month" id="smMonth" onchange="syncRange()"> '+
  '시작 <input type="date" id="smStart" value="'+r.start+'"> ~ 종료 <input type="date" id="smEnd" value="'+r.end+'">'+
  '<button class="btn pri" onclick="doSettle()">정산 조회</button></div>'+
  '<div id="smOut"></div></div>';
 doSettle();
}
function syncRange(){
 const mv=document.getElementById('smMonth').value;if(!mv)return;
 const [y,m]=mv.split('-').map(Number);// 정산월 m → 기간 (m-1월21 ~ m월20)... 사용자 규칙: 전월21~당월20
 const start=new Date(y,m-2,21), end=new Date(y,m-1,20);
 document.getElementById('smStart').value=fmt(start);
 document.getElementById('smEnd').value=fmt(end);
 doSettle();
}

  rows+='<tr><td>'+(i+1)+'</td><td>'+esc(q.seq)+'</td><td>'+esc(q.repairDate||q.date)+'</td><td>'+esc(q.reporter)+'</td><td>'+esc(q.equip)+'</td><td style="max-width:220px">'+esc((q.repair||q.inspect||'').slice(0,50))+'</td><td>'+esc(q.material)+'</td><td class="right">'+won(q.amount)+'</td><td>'+esc(q.engineer)+'</td></tr>';

 document.getElementById('smOut').innerHTML=
  '<div class="cards" style="margin-top:8px"><div class="card"><div class="lab">정산 건수</div><div class="num">'+list.length+'</div></div>'+
  '<div class="card"><div class="lab">자재비 합계</div><div class="num" style="font-size:20px">'+won(mat)+'</div></div>'+
  '<div class="card"><div class="lab">인건비(상주 2인)</div><div class="num" style="font-size:20px">'+won(LABOR)+'</div></div>'+
  '<div class="card"><div class="lab">총 정산액</div><div class="num" style="font-size:20px;color:var(--blue)">'+won(total)+'</div></div></div>'+
  '<table><thead><tr><th>No</th><th>SEQ</th><th>수리완료일</th><th>신고자</th><th>장비명</th><th>점검/수리내용</th><th>자재내역</th><th>자재비</th><th>담당</th></tr></thead><tbody>'+rows+'</tbody></table>';

function renderTos(v){
 v.innerHTML='<div class="panel"><h2>TOS 원본 붙여넣기</h2>'+
  '<div class="note">엑셀 TOS 원본에서 <b>헤더행(컬럼 제목)을 포함</b>해 범위를 드래그 복사한 뒤, 아래 칸을 클릭하고 <b>Ctrl+V</b>로 붙여넣으세요. 헤더 이름으로 자동 매핑하며 <b>TroubleSEQ 기준 신규 건만</b> 추가합니다.</div>'+
  '<div id="tosPaste" contenteditable="true" style="min-height:70px;border:2px dashed #94a3b8;border-radius:8px;padding:12px;color:#64748b;outline:none;white-space:pre-wrap;overflow:auto;max-height:140px" data-empty="1">여기를 클릭한 뒤 Ctrl+V 로 붙여넣으세요</div>'+
  '<div class="tools" style="margin-top:10px;display:flex;align-items:center;gap:8px">'+
   '<button class="btn" onclick="tosClear()">지우기</button>'+
   '<span id="tosCnt" class="mut"></span>'+
   '<span style="flex:1"></span>'+
   '<button class="btn pri" onclick="tosImport()">신규 건 추가하기</button>'+
  '</div>'+
  '<div id="tosGridWrap" style="margin-top:10px;overflow:auto;max-height:360px;border:1px solid #e2e8f0;border-radius:8px;display:none"></div>'+
  '<div id="tosOut" style="margin-top:12px"></div></div>';
 var box=document.getElementById('tosPaste');
 box.addEventListener('focus',function(){if(box.dataset.empty!=='0'){box.textContent='';box.style.color='#0f172a';box.dataset.empty='0';}});
 box.addEventListener('paste',function(e){
   e.preventDefault();
   var t=((e.clipboardData||window.clipboardData).getData('text'))||'';
   box.textContent='(붙여넣기 완료 — 아래 미리보기를 확인하고 "신규 건 추가하기"를 누르세요)';
   box.style.color='#16a34a';box.dataset.empty='1';
   TOSROWS=parseClip(t);
   tosPreview();
 });
}
function tosClear(){TOSROWS=[];var w=document.getElementById('tosGridWrap');if(w){w.style.display='none';w.innerHTML='';}var c=document.getElementById('tosCnt');if(c)c.textContent='';var o=document.getElementById('tosOut');if(o)o.innerHTML='';var b=document.getElementById('tosPaste');if(b){b.textContent='여기를 클릭한 뒤 Ctrl+V 로 붙여넣으세요';b.style.color='#64748b';b.dataset.empty='1';}}
function parseClip(text){
 var rows=[],row=[],cur='',i=0,inQ=false;
 while(i<text.length){var ch=text[i];
   if(inQ){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i+=2;continue;}inQ=false;i++;continue;}cur+=ch;i++;continue;}
   if(ch==='"'){inQ=true;i++;continue;}
   if(ch==='\t'){row.push(cur);cur='';i++;continue;}
   if(ch==='\r'){i++;continue;}
   if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';i++;continue;}
   cur+=ch;i++;
 }
 if(cur!==''||row.length){row.push(cur);rows.push(row);}
 return rows.filter(function(r){return r.some(function(c){return String(c).trim()!=='';});});
}
function tosDetect(){
 var hr=0,best=0;
 for(var i=0;i<Math.min(TOSROWS.length,15);i++){var m=0;TOSROWS[i].forEach(function(c){if(HEADER_MAP[String(c).trim().toLowerCase()])m++;});if(m>best){best=m;hr=i;}}
 var cols=best>0?TOSROWS[hr].map(function(c){return HEADER_MAP[String(c).trim().toLowerCase()]||null;}):[];
 return {hr:hr,best:best,cols:cols};
}
function tosPreview(){
 var w=document.getElementById('tosGridWrap'),c=document.getElementById('tosCnt');
 if(!TOSROWS.length){if(w){w.style.display='none';}if(c)c.textContent='붙여넣은 데이터가 없습니다.';return;}
 var d=tosDetect();
 var FN={occurDate:'고장발생일',date:'접수일',repairDate:'수리완료일',status:'고장상태',equip:'장비명',loc:'장비위치',reporter:'신고자',reporterId:'신고자ID',trouble:'고장내용',channels:'채널목록',chcnt:'채널수',inspect:'점검내용',repair:'수리내용',cause:'고장원인',company:'업체명',material:'고장부품',seq:'TroubleSEQ',amount:'금액'};
 var ncol=TOSROWS[d.hr]?TOSROWS[d.hr].length:0;
 var html='<table style="font-size:12px;border-collapse:collapse;width:max-content"><thead><tr>';
 for(var j=0;j<ncol;j++){var k=d.cols[j];html+='<th style="white-space:nowrap;border:1px solid #e2e8f0;padding:4px 8px;'+(k?'background:#dbeafe;color:#1e40af':'background:#f1f5f9;color:#94a3b8')+'">'+esc(TOSROWS[d.hr][j]||'')+(k?'<br><span style="font-size:10px">▸ '+FN[k]+'</span>':'<br><span style="font-size:10px">(무시)</span>')+'</th>';}
 html+='</tr></thead><tbody>';
 var shown=0;
 for(var r=d.hr+1;r<TOSROWS.length && shown<30;r++){html+='<tr>';for(var j2=0;j2<ncol;j2++){html+='<td style="white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;border:1px solid #eef2f7;padding:4px 8px">'+esc((TOSROWS[r][j2]||'').toString().slice(0,40))+'</td>';}html+='</tr>';shown++;}
 html+='</tbody></table>';
 w.innerHTML=html;w.style.display='block';
 var dataCnt=TOSROWS.length-(d.hr+1);if(dataCnt<0)dataCnt=0;
 c.textContent='인식 헤더 '+d.best+'개 · 데이터 '+dataCnt+'행'+(d.best<2?' · ⚠ 헤더를 못 찾았습니다(헤더행 포함해 복사하세요)':' · 미리보기는 최대 30행')+' ';
}
function tosImport(){
 var out=document.getElementById('tosOut');
 if(!TOSROWS.length){out.innerHTML='<div class="note">먼저 엑셀 데이터를 붙여넣으세요.</div>';return;}
 var d=tosDetect();
 if(d.best<2){out.innerHTML='<div class="note">헤더(컬럼명)를 찾지 못했습니다. 엑셀에서 <b>헤더행을 포함</b>해 복사했는지 확인하세요.</div>';return;}
 var existing={};DB.forEach(function(q){existing[String(q.seq)]=1;});
 var add=0,dup=0,err=0;
 for(var i=d.hr+1;i<TOSROWS.length;i++){
   var row=TOSROWS[i];if(!row||row.every(function(c){return c===''||c==null;}))continue;
   var o={};d.cols.forEach(function(k,ci){if(k)o[k]=row[ci];});
   if(!o.seq && !o.equip && !o.reporter){err++;continue;}
   var seq=(o.seq!=null&&o.seq!=='')?String(o.seq).trim():('X'+i);
   if(existing[seq]){dup++;continue;}
   existing[seq]=1;
   var no=Math.max(0,...DB.map(function(x){return Number(x.no)||0;}))+1;
   DB.push({id:'R'+seq,no:no,seq:seq,date:o.date||'',reporter:o.reporter||'',reporterId:o.reporterId||'',
     equip:o.equip||'',loc:o.loc||'',trouble:o.trouble||'',stage:statusToStage(o.status),
     inspect:o.inspect||'',repair:o.repair||'',material:o.material||'',amount:Number(String(o.amount==null?'':o.amount).replace(/[^0-9.-]/g,''))||0,
     cause:o.cause||'',inspectDate:'',repairDate:o.repairDate||'',engineer:'',engEmail:'',company:o.company||'원익피앤이'});
   add++;
 }
 persist();
 out.innerHTML='<div class="ok">완료 · 신규 <b>'+add+'</b>건 추가 / 중복 '+dup+'건 / 오류 '+err+'건. 진행현황·점검요청 화면에서 확인하세요.</div>';
}

 else if(pw!=null){alert('비밀번호가 올바르지 않습니다.');}
