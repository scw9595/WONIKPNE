<script>
/* ============================================================
   firebase-sync.js  ·  WONIK PNE 접수 SYSTEM 공유 DB 동기화 레이어
   ────────────────────────────────────────────────────────────
   - localStorage = 로컬 캐시(앱은 기존처럼 즉시 읽기/쓰기)
   - Firebase Realtime Database = 모든 사용자가 공유하는 실제 DB
   - localStorage.setItem 을 후킹하여 'tos_'로 시작하는 모든 데이터를
     자동으로 Firebase에 미러링하고, 다른 사용자의 변경을 실시간 반영.
   - Firebase 미설정/오류 시 자동으로 "로컬 전용 모드"로 동작(기존과 동일).
   ※ 앱(HTML) 코드는 거의 수정하지 않습니다(부팅 1곳 + head 스크립트만).
   ============================================================ */
(function () {
  var ROOT     = window.FIREBASE_ROOT || 'wonikpne_tos';
  var PREFIX   = 'tos_';
  // 기기 로컬 전용(공유 제외): 현재 보고 있는 현장, 마지막 저장시각, 변경이력(고빈도)
  var EXCLUDE  = ['tos_site_v1', 'tos_lastsave_v1', 'tos_changelog_v1'];

  var origSet    = localStorage.setItem.bind(localStorage);
  var origRemove = localStorage.removeItem.bind(localStorage);

  var db = null, auth = null;
  var ready = false;          // Firebase 동기화 준비 완료
  var applyingRemote = false; // 원격 변경을 로컬에 적용하는 중(되돌림 방지)
  var pending = {};           // 키별 디바운스 타이머

  /* RTDB 경로에 쓸 수 없는 문자( . # $ [ ] / )를 안전하게 인코딩 */
  function enc(k){ return k.replace(/[.#$\[\]\/]/g, function(c){ return '~' + c.charCodeAt(0).toString(16) + '~'; }); }
  function dec(k){ return k.replace(/~([0-9a-f]{2})~/gi, function(_, h){ return String.fromCharCode(parseInt(h, 16)); }); }

  function shareable(k){
    if (!k || k.indexOf(PREFIX) !== 0) return false;
    if (EXCLUDE.indexOf(k) >= 0) return false;
    return true;
  }

  /* ── localStorage 쓰기 후킹 → Firebase 미러 ───────────────── */
  localStorage.setItem = function (k, v) {
    origSet(k, v);
    if (ready && !applyingRemote && shareable(k)) pushKey(k, v);
  };
  localStorage.removeItem = function (k) {
    origRemove(k);
    if (ready && !applyingRemote && shareable(k)) {
      try { db.ref(ROOT + '/' + enc(k)).remove(); } catch (e) {}
    }
  };

  function pushKey(k, v) {
    clearTimeout(pending[k]);
    pending[k] = setTimeout(function () {     // 연속 저장 200ms 디바운스
      try {
        db.ref(ROOT + '/' + enc(k)).set({
          v:  v,                              // 이미 JSON 문자열
          at: Date.now(),
          by: (typeof curRoleName === 'function' ? curRoleName() : '사용자')
        });
      } catch (e) { console.warn('[FB] 업로드 실패:', k, e); }
    }, 200);
  }

  /* ── 부팅: 초기 전체 내려받기 → localStorage 채움 → 콜백 ───── */
  window.FBSync = {
    enabled: function(){ return ready; },
    boot: function (done) {
      done = done || function(){};
      var cfg = window.FIREBASE_CONFIG;
      if (typeof firebase === 'undefined' || !cfg || !cfg.apiKey || cfg.apiKey.indexOf('여기에') === 0) {
        console.warn('[FB] Firebase 설정 없음 → 로컬(localStorage) 전용 모드로 동작합니다.');
        return done();
      }
      try {
        firebase.initializeApp(cfg);
        db = firebase.database();
        if (firebase.auth) auth = firebase.auth();
      } catch (e) {
        console.warn('[FB] 초기화 실패 → 로컬 모드', e);
        return done();
      }

      // (선택) 익명 로그인: 규칙을 "auth != null"로 둘 때 사용. 실패해도 계속 진행.
      var authStep = (auth && auth.signInAnonymously)
        ? auth.signInAnonymously().catch(function(e){ console.warn('[FB] 익명로그인 생략', e && e.code); })
        : Promise.resolve();

      authStep.then(function () {
        return db.ref(ROOT).once('value');
      }).then(function (snap) {
        var all = snap.val() || {};
        applyingRemote = true;
        Object.keys(all).forEach(function (ek) {
          var rec = all[ek];
          if (rec && typeof rec.v === 'string') origSet(dec(ek), rec.v);
        });
        applyingRemote = false;
        ready = true;
        attachLive();
        console.log('[FB] 공유 DB 동기화 완료 — 내려받은 항목:', Object.keys(all).length);
        done();
      }).catch(function (e) {
        console.warn('[FB] 초기 동기화 실패 → 로컬 모드', e);
        done();
      });
    }
  };

  /* ── 실시간 수신: 다른 사용자의 변경 반영 ─────────────────── */
  function attachLive() {
    db.ref(ROOT).on('child_added',   onRemote);
    db.ref(ROOT).on('child_changed', onRemote);
    db.ref(ROOT).on('child_removed', function (snap) {
      var key = dec(snap.key);
      applyingRemote = true; origRemove(key); applyingRemote = false;
      rerenderIfCurrent(key);
    });
  }
  function onRemote(snap) {
    var rec = snap.val();
    if (!rec || typeof rec.v !== 'string') return;
    var key = dec(snap.key);
    if (localStorage.getItem(key) === rec.v) return;   // 내가 쓴 것이면 무시
    applyingRemote = true; origSet(key, rec.v); applyingRemote = false;
    rerenderIfCurrent(key);
  }

  /* 사용자가 입력/편집 중이면 화면 새로고침을 미뤄 입력 내용 보호 */
  function userBusy() {
    try {
      if (typeof asEditId !== 'undefined' && asEditId) return true;
      var a = document.activeElement;
      if (a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName)) return true;
    } catch (e) {}
    return false;
  }

  var rerenderTimer = null;
  function rerenderIfCurrent(key) {
    var base    = key.split('__')[0];
    var keySite = key.indexOf('__') >= 0 ? key.split('__')[1] : '대전LGES';
    var COMMON  = ['tos_eng_v4', 'tos_fixpresets_v1', 'tos_matches_v1', 'tos_logo_v1']; // 현장 공통
    var curSite = (typeof SITE !== 'undefined' ? SITE : '대전LGES');
    var affects = (keySite === curSite) || COMMON.indexOf(base) >= 0;
    if (!affects) return;                 // 다른 현장 데이터는 캐시만 갱신(다음 렌더 때 반영)
    if (userBusy()) return;               // 편집 중이면 갱신 보류(캐시는 이미 최신)

    clearTimeout(rerenderTimer);
    rerenderTimer = setTimeout(function () {
      try {
        var t = (typeof curTab !== 'undefined') ? curTab : null;
        var f = (typeof dashFilter !== 'undefined') ? dashFilter : null;
        if (typeof loadSiteData === 'function' && typeof SITE !== 'undefined') loadSiteData(SITE);
        if (t !== null) curTab = t;       // 보던 화면 유지(loadSiteData가 dash로 초기화하는 것 복원)
        if (typeof dashFilter !== 'undefined' && f !== null) dashFilter = f;
        if (typeof render === 'function') render();
      } catch (e) { console.warn('[FB] 재렌더 실패', e); }
    }, 150);
  }
})();

</script>

<style>
:root{
 --acc:#4f46e5;--acc2:#6366f1;--acc-soft:#eef2ff;--acc-bd:#c7d2fe;--acc-dk:#4338ca;
 --bg:#f4f5fa;--surface:#ffffff;--bd:#e6e8ee;--bd2:#eef0f4;
 --fg:#0f1729;--mut:#64748b;--mut2:#9aa3b2;
 --s1:#94a3b8;--s2:#8b5cf6;--s3:#0ea5e9;--s4:#f59e0b;--s5:#ef4444;--s6:#10b981;
 --r:14px;--r2:10px;
 --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);
 --shadow-md:0 4px 12px rgba(16,24,40,.06),0 2px 4px rgba(16,24,40,.04);
 --shadow-lg:0 12px 32px rgba(16,24,40,.10);
}
*{box-sizing:border-box}
body{margin:0;font-family:Pretendard,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg);font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d4d8e0;border-radius:8px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#b8bdc8;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
/* ===== 레이아웃: 좌측 사이드바 ===== */
.shell{display:flex;min-height:100vh}
.sidebar{width:240px;flex:0 0 240px;background:linear-gradient(180deg,#fbfcfe 0%,#f7f8fc 100%);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--bd2)}
.brand .logo{display:flex;align-items:center;gap:10px}
.brand .mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:-.5px;box-shadow:0 4px 10px rgba(79,70,229,.28)}
.brand h1{font-size:15px;margin:0;font-weight:800;letter-spacing:-.3px}
.brand .sub{font-size:11px;color:var(--mut2);margin-top:8px;line-height:1.5}
.nav-sec{padding:6px 14px;font-size:10.5px;font-weight:700;color:var(--mut2);letter-spacing:.6px;text-transform:uppercase;margin-top:10px}
nav#nav{display:flex;flex-direction:column;gap:2px;padding:4px 10px 16px}
nav#nav button{display:flex;align-items:center;gap:10px;border:none;background:none;padding:10px 12px;font-size:13.5px;cursor:pointer;color:#3b4456;border-radius:10px;text-align:left;width:100%;font-weight:550;transition:.15s;position:relative}
nav#nav button:hover{background:#eceef4;color:#1f2937}
nav#nav button.on{background:var(--surface);color:var(--acc);font-weight:750;box-shadow:var(--shadow-md)}
nav#nav button.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--acc)}
nav#nav button.adm{color:#9a6a14}
nav#nav button.adm.on{background:var(--surface);color:#b45309}
nav#nav button.adm.on::before{background:#d97706}
/* ===== 콘텐츠 ===== */
.content{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:rgba(255,255,255,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.topbar .pageT{font-size:15.5px;font-weight:750;letter-spacing:-.3px}
.topbar .spacer{flex:1}
.role{font-size:12px;color:var(--mut);background:#eef1f5;padding:6px 12px;border-radius:999px;font-weight:650}
.role.adm{background:var(--acc-soft);color:var(--acc)}
main#view{padding:22px 34px;max-width:none;width:100%;margin:0 auto}
/* ===== 버튼 ===== */
.btn{cursor:pointer;border:1px solid var(--bd);background:#fff;color:var(--fg);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:650;transition:.15s;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.btn:hover{background:#f9fafb;border-color:#d1d5db;transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn:active{transform:translateY(0)}
.btn.pri{background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(79,70,229,.25)}
.btn.pri:hover{box-shadow:0 4px 14px rgba(79,70,229,.36)}
.btn.dng{background:#fff;color:#dc2626;border-color:#fbcaca}
.btn.dng:hover{background:#fef2f2}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
/* ===== 카드 ===== */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(124px,1fr));gap:12px;margin-bottom:18px}
.card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:15px 16px;cursor:pointer;transition:.16s;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card::after{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:var(--acc);opacity:0;transition:.16s}
.card:hover{border-color:var(--acc-bd);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.card:hover::after{opacity:.5}
.card.on{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft),var(--shadow-md)}
.card.on::after{opacity:1}
.card .lab{font-size:12px;color:var(--mut);font-weight:650}
.card .num{font-size:28px;font-weight:850;margin-top:6px;letter-spacing:-1px;color:#0f1729}
/* ===== 태그 ===== */
.tag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;color:#fff;white-space:nowrap;font-weight:650;letter-spacing:.1px}
.t1{background:#eef1f5;color:#475569}.t2{background:#f1ecfe;color:#7c3aed}.t3{background:#e6f6fd;color:#0284c7}.t4{background:#fef4e6;color:#d97706}.t5{background:#fdecec;color:#dc2626}.t6{background:#e7f8f0;color:#059669}
/* ===== 패널/표 ===== */
.panel{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel h2{font-size:16px;margin:0 0 14px;font-weight:800;letter-spacing:-.3px}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
th,td{border-bottom:1px solid var(--bd2);padding:10px 11px;text-align:left;vertical-align:top}
th{background:#f8f9fc;font-weight:700;color:#566075;font-size:11.5px;letter-spacing:.2px;text-transform:uppercase;position:sticky;top:0}
th:first-child{border-top-left-radius:8px}th:last-child{border-top-right-radius:8px}
tbody tr{transition:.1s}
tbody tr:hover td{background:#fafaff}
tbody tr:last-child td{border-bottom:none}
tr.clk{cursor:pointer}
tr.clk:hover td{background:#f5f5ff}
.tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--bd);border-radius:10px;padding:8px 11px;color:var(--fg);background:#fff;transition:.15s}
input:hover,select:hover,textarea:hover{border-color:#cbd2dc}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
textarea{width:100%;resize:vertical;min-height:46px}
input[type=text],input[type=number],input[type=date],input[type=month],input[type=search]{min-width:120px}
.num-r,.right{text-align:right}
.mut{color:var(--mut)}
/* ===== 모달 ===== */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,41,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:34px;z-index:50;overflow:auto}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:18px;max-width:780px;width:100%;padding:26px;box-shadow:var(--shadow-lg)}
.modal h3{margin:0 0 16px;font-size:17.5px;font-weight:800;letter-spacing:-.3px}
.asgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:12px}
.assec{font-size:11.5px;font-weight:800;color:var(--acc-dk);margin:18px 0 9px;padding-bottom:6px;border-bottom:1px solid var(--bd);letter-spacing:.3px;text-transform:uppercase}
.asf{display:flex;flex-direction:column;gap:5px;min-width:0}
.asf>label{font-size:11px;font-weight:700;color:var(--mut)}
.asf .asauto{background:#f4f6f9;border:1px solid var(--bd);border-radius:9px;padding:8px 11px;font-size:12.5px;color:#374151;min-height:18px;word-break:break-word;white-space:pre-wrap}
.asf input,.asf select{width:100%}
@media(max-width:640px){.asgrid{grid-template-columns:1fr}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:9px}
.fld label{font-size:12px;color:var(--mut);font-weight:650}
.note{background:var(--acc-soft);border:1px solid var(--acc-bd);color:#3730a3;padding:10px 13px;border-radius:10px;font-size:12.5px;margin-bottom:12px;line-height:1.55}
.ok{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;padding:10px 13px;border-radius:10px;font-size:12.5px;margin-bottom:10px}
.drop{border:2px dashed var(--bd);border-radius:12px;padding:32px;text-align:center;color:var(--mut);cursor:pointer;transition:.15s}
.drop:hover{border-color:var(--acc-bd);background:#fafbff}
.drop.over{border-color:var(--acc);background:var(--acc-soft);color:var(--acc)}
.hide{display:none!important}
/* ===== 진행현황 3단 ===== */
.dashwrap{display:grid;grid-template-columns:240px minmax(0,1fr) 300px;gap:16px;align-items:start}
.side{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.side h2{font-size:13.5px;margin:0 0 12px;display:flex;align-items:center;gap:7px;font-weight:800}
.side h2 .dot{width:8px;height:8px;border-radius:50%;display:inline-block;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
.dot-n{background:#f59e0b}.dot-q{background:#0ea5e9}
.notice{border:1px solid var(--bd);background:#fafbfc;border-radius:11px;padding:12px 13px;margin-bottom:9px;font-size:12.5px;line-height:1.55;color:#374151;position:relative;transition:.14s}
.notice:hover{box-shadow:var(--shadow-md)}
.notice.pin{border-color:var(--acc-bd);background:var(--acc-soft);color:#3730a3;font-weight:600}
.notice .nt-d{font-size:10.5px;color:var(--mut2);margin-top:6px}
.notice .nt-x{position:absolute;top:8px;right:9px;cursor:pointer;color:var(--mut2);font-weight:700;font-size:14px;line-height:1}
.notice .nt-x:hover{color:#dc2626}
.inq{border:1px solid var(--bd);border-radius:11px;padding:12px 13px;margin-bottom:9px;font-size:12.5px;line-height:1.55;background:#fff;transition:.14s}
.inq:hover{box-shadow:var(--shadow-md)}
.inq .iq-h{display:flex;justify-content:space-between;gap:6px;align-items:center;margin-bottom:4px}
.inq .iq-who{font-weight:750}
.inq .iq-eq{color:var(--mut);font-size:11px}
.inq .iq-msg{white-space:pre-wrap;word-break:break-word;color:#374151}
.inq .iq-ans{margin-top:7px;border-top:1px dashed var(--bd);padding-top:7px;color:#065f46;background:#ecfdf5;border-radius:9px;padding:8px 10px}
.inq .iq-ans b{color:#047857}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;color:#fff;font-weight:650;vertical-align:middle}
.bd-w{background:#f59e0b}.bd-d{background:#10b981}
.side .fld{margin-bottom:7px}
.side input,.side textarea{width:100%;min-width:0}
.side textarea{min-height:56px}
/* ===== 결과보고서 전표 ===== */
.rpt{border:1px solid var(--bd);border-radius:14px;margin:0 0 22px;overflow:hidden;box-shadow:var(--shadow-md)}
.rpt-h{background:linear-gradient(135deg,#312e81 0%,#1e1b4b 100%);color:#fff;text-align:center;padding:18px}

/* ============================================================
   UI POLISH v42 — 세련/트렌디 마감 레이어 (마지막에 적용되어 우선)
   ============================================================ */
:root{--ring:0 0 0 3px rgba(99,102,241,.16);--bd-soft:#eceef4;--ink:#0b1220}
body{background:
  radial-gradient(900px 480px at 100% -5%,rgba(99,102,241,.05),transparent 60%),
  radial-gradient(760px 460px at -8% 8%,rgba(14,165,233,.045),transparent 55%),
  var(--bg);
  font-feature-settings:"cv11","ss01";letter-spacing:-.1px}
/* 스크롤바 */
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:#d3d8e2;border:3px solid transparent;border-radius:99px;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#b9c0cd;background-clip:content-box}
/* 사이드바 — 액티브 강조를 그라데이션 필 + 글로우로 */
.sidebar{background:linear-gradient(185deg,#fbfcff 0%,#f4f6fc 100%);backdrop-filter:blur(6px)}
.brand .mark{box-shadow:0 6px 16px rgba(79,70,229,.34),inset 0 1px 0 rgba(255,255,255,.25)}
nav#nav button{font-weight:560;letter-spacing:-.2px}
nav#nav button:hover{background:#e9ecf5;transform:translateX(2px)}
nav#nav button.on{background:linear-gradient(135deg,#eef2ff 0%,#e8edff 100%);color:var(--acc-dk);font-weight:800;box-shadow:inset 0 0 0 1px var(--acc-bd),0 6px 16px -8px rgba(79,70,229,.5)}
nav#nav button.on::before{height:60%;width:3px;background:linear-gradient(180deg,#6366f1,#4f46e5)}
nav#nav button.adm.on{background:linear-gradient(135deg,#fff7ed 0%,#ffefdc 100%);color:#b45309;box-shadow:inset 0 0 0 1px #fcd9a8,0 6px 16px -8px rgba(217,119,6,.45)}
/* 토픽바 — 더 투명한 글래스 */
.topbar{background:rgba(255,255,255,.72);backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);border-bottom:1px solid rgba(230,232,238,.9)}
.topbar .pageT{letter-spacing:-.4px}
.role{background:#eef1f6;box-shadow:inset 0 0 0 1px rgba(0,0,0,.02)}
.role.adm{background:linear-gradient(135deg,#eef2ff,#e7ecff);box-shadow:inset 0 0 0 1px var(--acc-bd)}
/* 버튼 — 미세 그라데이션/링 */
.btn{border-radius:11px;font-weight:680;letter-spacing:-.2px;box-shadow:0 1px 1px rgba(16,24,40,.04),0 1px 2px rgba(16,24,40,.04)}
.btn:hover{box-shadow:0 6px 16px -8px rgba(16,24,40,.28)}
.btn:focus-visible{outline:none;box-shadow:var(--ring)}
.btn.pri{background:linear-gradient(135deg,#6d6af0 0%,#5048e5 100%)}
.btn.pri:hover{box-shadow:0 10px 22px -8px rgba(79,70,229,.6)}
.btn.sm{border-radius:9px}
/* 카드 — 광택 라인 + 넘버 폰트 */
.card{border-radius:16px;border-color:var(--bd-soft)}
.card::after{height:3px;background:linear-gradient(90deg,#6366f1,#0ea5e9)}
.card:hover{box-shadow:0 14px 30px -16px rgba(16,24,40,.32)}
.card .num{font-variant-numeric:tabular-nums;letter-spacing:-1.2px}
/* 패널 */
.panel{border-radius:16px;border-color:var(--bd-soft);box-shadow:0 1px 2px rgba(16,24,40,.04),0 10px 30px -22px rgba(16,24,40,.28)}
.panel h2{letter-spacing:-.4px}
/* 입력 — 포커스 링 통일 */
input,select,textarea{border-radius:11px;border-color:#dde1ea;background:#fcfdff}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);background:#fff;box-shadow:var(--ring)}
/* 태그 — 살짝 입체 */
.tag{box-shadow:inset 0 0 0 1px rgba(0,0,0,.03);letter-spacing:.2px}
/* 표 — 헤더 스티키 + 톤 정리 */
table{font-variant-numeric:tabular-nums}
table thead th{position:sticky;top:0;background:#f7f8fc;z-index:1;font-weight:750;color:#5a6478;letter-spacing:-.1px;border-bottom:1px solid var(--bd)}
table tbody tr{transition:.12s}
table tbody tr:hover{background:#f6f8fe}
/* 섹션 라벨 */
.assec{color:var(--acc-dk);letter-spacing:.4px}
/* note — 부드러운 톤 */
.note{background:linear-gradient(135deg,#f3f5ff 0%,#eef2ff 100%);border-color:var(--acc-bd);box-shadow:inset 0 0 0 1px rgba(255,255,255,.5)}
/* 운영분석 좌측 메뉴 액티브 강조 */
.csopsBtn.on{box-shadow:inset 0 0 0 1px var(--acc-bd),0 6px 14px -8px rgba(79,70,229,.45)}
/* 허브 사이트 카드 진행바 라운드 */
.scBar{border-radius:99px;overflow:hidden}
/* 로그인 카드 — 더 또렷한 떠있음 */
.login-card{border-radius:22px;box-shadow:0 30px 70px -26px rgba(30,41,99,.4),0 2px 8px rgba(16,24,40,.06)}
.login-mark{box-shadow:0 12px 26px rgba(79,70,229,.4),inset 0 1px 0 rgba(255,255,255,.3)}

function trashRestore(tu){
 var i=-1;for(var k=0;k<TRASH.length;k++){if(TRASH[k].tu===tu){i=k;break;}}
 if(i<0)return;var e=TRASH[i];

function uploadLogo(input){
 var f=input.files&&input.files[0];if(!f)return;
 if(f.size>5*1024*1024){alert('파일이 너무 큽니다(5MB 이하 권장).');return;}
 var rd=new FileReader();
 rd.onload=function(){
   var src=rd.result;
   if(f.type==='image/svg+xml'){ saveLogo(src); return; }   // SVG는 그대로
   // 비트맵: 가로 480px로 축소해 용량 최적화(투명 유지)
   var im=new Image();
   im.onload=function(){
     var maxW=480, w=im.width, h=im.height;
     if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
     var c=document.createElement('canvas');c.width=w;c.height=h;
     c.getContext('2d').drawImage(im,0,0,w,h);
     var out;
     try{ out=c.toDataURL('image/png'); }catch(e){ out=src; }
     saveLogo(out);
   };
   im.onerror=function(){ saveLogo(src); };
   im.src=src;
 };
 rd.readAsDataURL(f);
}

 save('tos_logo_v1',dataURL);
 applyBrandLogo();
 if(typeof curTab!=='undefined'&&curTab==='data')render();
 alert('회사 로고가 적용되었습니다. 다른 PC에는 새로고침 시 반영됩니다.');

 const s=document.getElementById('smStart').value, e=document.getElementById('smEnd').value;
 const list=DB.filter(q=>q.stage==='⑥완료').filter(q=>{
   const d=q.repairDate||q.date;if(!d)return false;return d>=s && d<=e;
 });
 var labor=isLaborSite();
 let mat=0,mdJob=0;let rows='';
 list.forEach((q,i)=>{mat+=Number(q.amount)||0;mdJob+=Number(q.md)||0;
  rows+='<tr><td>'+(i+1)+'</td><td>'+esc(q.seq)+'</td><td>'+esc(q.repairDate||q.date)+'</td><td>'+esc(q.reporter)+'</td><td>'+esc(q.equip)+'</td><td style="max-width:220px">'+esc((q.repair||q.inspect||'').slice(0,50))+'</td><td>'+esc(q.material)+'</td><td class="right">'+won(q.amount)+'</td>'+(labor?'':'<td class="right">'+(Number(q.md)||0)+'</td>')+'<td>'+esc(q.engineer)+'</td></tr>';
 });
 var colspan=labor?9:10;
 if(!list.length)rows='<tr><td colspan="'+colspan+'" class="mut" style="text-align:center;padding:18px">해당 기간에 완료된 정산 대상 건이 없습니다.</td></tr>';
 var laborCost,mdExtraSum=0,mdTotal=0,rate=0;
 if(labor){laborCost=LABOR;}
 else{rate=mdRate();mdExtraSum=periodMdSum(s,e);mdTotal=mdJob+mdExtraSum;laborCost=mdTotal*rate;}
 const total=mat+laborCost;
 _settle={list:list,mat:mat,total:total,s:s,e:e,labor:labor,laborCost:laborCost,mdJob:mdJob,mdExtraSum:mdExtraSum,mdTotal:mdTotal,rate:rate};
 var cards='<div class="cards" style="margin-top:8px"><div class="card"><div class="lab">정산 건수</div><div class="num">'+list.length+'</div></div>'+

 if(labor){cards+='<div class="card"><div class="lab">인건비(상주 2인)</div><div class="num" style="font-size:20px">'+won(LABOR)+'</div></div>';}

  '<div class="card"><div class="lab">인건비(공수×단가)</div><div class="num" style="font-size:20px">'+won(laborCost)+'</div></div>';}
 cards+='<div class="card"><div class="lab">총 정산액</div><div class="num" style="font-size:20px;color:var(--acc)">'+won(total)+'</div></div></div>';
 document.getElementById('smOut').innerHTML=cards+

function statusToStage(st){st=(st||'').toString();

//============ 대전SKON 전용 원본 업로드 ============
var SKONROWS=[];
var SKON_YEAR=(new Date()).getFullYear();
function skonField(h){
 h=String(h).trim().toLowerCase().replace(/[ .]/g,'');
 if(h==='상태'||h==='요청'||h==='구분'||h==='진행')return 'status';
 if(h.indexOf('고장일')>=0||h.indexOf('발생일')>=0||h.indexOf('접수일')>=0||h==='일자'||h==='날짜')return 'date';
 if(h==='위치')return 'loc';
 if(h.indexOf('pcno')>=0||h==='pc')return 'pcno';
 if(h.indexOf('충방전기no')>=0||h.indexOf('충방전기')>=0||h==='설비'||h==='장비'||h==='설비명'||h==='장비명')return 'equip';
 if(h==='채널'||h==='ch'||h==='채널수')return 'channels';
 if(h.indexOf('증상')>=0||h.indexOf('현상')>=0||h.indexOf('접수내용')>=0||(h.indexOf('고장')>=0&&h.indexOf('내용')>=0))return 'trouble';
 if(h==='담당자'||h==='담당')return 'reporter';
 if(h.indexOf('점검내역')>=0||h.indexOf('점검내용')>=0||h.indexOf('처리')>=0||h.indexOf('조치')>=0||h.indexOf('수리')>=0)return 'repair';
 return null;
}
// 고장일: 엑셀 일련번호 / 02-12(MM-DD) / 2/12(M/D) / 2026-02-12 / 2026.02.12 등 모두 지원
function excelDate(val){
 var s=String(val==null?'':val).trim();
 if(!s)return '';
 var m=s.match(/(\d{4})[-.\/](\d{1,2})[-.\/](\d{1,2})/); // YYYY-MM-DD
 if(m)return m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
 m=s.match(/^(\d{1,2})[-.\/](\d{1,2})$/); // MM-DD / M/D (연도 없음 → 기준연도)
 if(m){var mo=parseInt(m[1],10),dy=parseInt(m[2],10);if(mo>=1&&mo<=12&&dy>=1&&dy<=31)return SKON_YEAR+'-'+String(mo).padStart(2,'0')+'-'+String(dy).padStart(2,'0');}
 var n=parseInt(s.replace(/[^0-9]/g,''),10); // 엑셀 일련번호
 if(!isNaN(n)&&n>=20000&&n<=80000){var d=new Date(Date.UTC(1899,11,30)+n*86400000);return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
 return '';
}
// 점검내역에서 완료일 추출: (6/22) 또는 6/22 또는 6.22 형태 모두
function skonRepairDate(date,repair){
 if(!date)return '';
 var r=String(repair);
 var m=r.match(/(\d{1,2})[\/.](\d{1,2})/);
 if(!m)return '';
 var yr=parseInt(date.slice(0,4),10),fmo=parseInt(date.slice(5,7),10),fdy=parseInt(date.slice(8,10),10);
 var cmo=parseInt(m[1],10),cdy=parseInt(m[2],10);
 if(cmo<1||cmo>12||cdy<1||cdy>31)return '';
 if(cmo<fmo||(cmo===fmo&&cdy<fdy))yr+=1;
 return yr+'-'+String(cmo).padStart(2,'0')+'-'+String(cdy).padStart(2,'0');
}
function skonStage(status,repair){
 var s=String(status||''),r=String(repair||'');
 if(/완료|정상화|정상|종료/.test(s)||/완료|정상화/.test(r))return '⑥완료';
 if(/견적/.test(s))return '④자재입고대기중';
 if(/수리/.test(s))return '⑤수리중';
 if(/재점검|점검/.test(s))return '③점검중';
 return '①접수';
}

// 탭/콤마 구분자 자동 인식 파서
function skonParseText(text){
 if(!text)return [];
 var firstLine=text.split(/\r?\n/)[0]||'';
 var delim=(firstLine.indexOf('\t')>=0)?'\t':((firstLine.split(',').length>firstLine.split('\t').length)?',':'\t');
 var rows=[],row=[],cur='',i=0,inQ=false;
 while(i<text.length){var ch=text[i];
   if(inQ){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i+=2;continue;}inQ=false;i++;continue;}cur+=ch;i++;continue;}
   if(ch==='"'){inQ=true;i++;continue;}
   if(ch===delim){row.push(cur);cur='';i++;continue;}
   if(ch==='\r'){i++;continue;}
   if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';i++;continue;}
   cur+=ch;i++;
 }
 if(cur!==''||row.length){row.push(cur);rows.push(row);}
 return rows.filter(function(r){return r.some(function(c){return String(c).trim()!=='';});});
}

 var add=0,dup=0,err=0;
 for(var i=d.hr+1;i<TOSROWS.length;i++){
   var row=TOSROWS[i];if(!row||row.every(function(c){return c===''||c==null;}))continue;
   var o={};d.cols.forEach(function(k,ci){if(k)o[k]=row[ci];});
   if(!o.seq && !o.equip && !o.reporter){err++;continue;}
   var seq=(o.seq!=null&&o.seq!=='')?String(o.seq).trim():('X'+i);
   if(existing[seq]){dup++;continue;}
   existing[seq]=1;
   var no=Math.max(0,...DB.map(function(x){return Number(x.no)||0;}))+1;
   DB.push({id:'R'+seq,no:no,seq:seq,date:o.date||'',reporter:o.reporter||'',reporterId:o.reporterId||'',
     equip:o.equip||'',loc:o.loc||'',trouble:(o.trouble||o.trouble_alt||''),stage:statusToStage(o.status),
     inspect:o.inspect||'',repair:o.repair||'',material:o.material||'',amount:Number(String(o.amount==null?'':o.amount).replace(/[^0-9.-]/g,''))||0,
     cause:o.cause||'',inspectDate:'',repairDate:o.repairDate||'',engineer:'',engEmail:'',company:o.company||'원익피앤이'});
   add++;
 }
 persist();
 out.innerHTML='<div class="ok">완료 · 신규 <b>'+add+'</b>건 추가 / 중복 '+dup+'건 / 오류 '+err+'건. 진행현황·점검요청 화면에서 확인하세요.</div>';
}

//============ 로그인 화면 ============
var superPending=false; // 별표3회 → 메인관리자 로그인 대기
// ===== 회사 로고 적용 (로그인 화면 + 사이드바) =====
function applyBrandLogo(){
 var data=load('tos_logo_v1','');
 [['loginMark',1],['brandMark',0]].forEach(function(p){
   var el=document.getElementById(p[0]);if(!el)return;
   if(data){ el.classList.add('haslogo'); el.innerHTML='<img src="'+data+'" alt="회사 로고">'; }
   else { el.classList.remove('haslogo'); el.innerHTML='W'; }
 });
}
function showLogin(){
 isAdmin=false;isSuper=false;superPending=false;
 applyBrandLogo();
 var lo=document.getElementById('logoutBtn');if(lo)lo.style.display='none';
 document.getElementById('login').classList.add('on');
 var err=document.getElementById('loginErr');if(err)err.textContent='';
 var pw=document.getElementById('loginPw');if(pw){pw.value='';setTimeout(function(){pw.focus();},80);}
 updateLoginUI();
}
function updateLoginUI(){
 var sub=document.querySelector('.login-sub');var inp=document.getElementById('loginPw');var foot=document.querySelector('.login-foot');
 if(superPending){
   if(sub)sub.innerHTML='<b style="color:#4f46e5">메인관리자 로그인</b> · 변경 이력 포함 전체 권한';
   if(inp)inp.placeholder='메인관리자 비밀번호';
   if(foot)foot.textContent='메인관리자 비밀번호를 입력하세요. (일반 로그인으로 돌아가려면 새로고침)';
 }else{
   if(sub)sub.textContent='충방전기 고장 접수·점검·정산 통합 관리';
   if(inp)inp.placeholder='비밀번호를 입력하세요';
   if(foot)foot.textContent='접근 권한이 있는 사용자만 로그인할 수 있습니다.';
 }
}
function doLogin(){
 var pw=document.getElementById('loginPw').value;
 var err=document.getElementById('loginErr');
 if(superPending){
   if(pw==='yes@@231021'){isSuper=true;isAdmin=true;enterApp();return;}
   if(pw==='wonikpne'){isSuper=false;isAdmin=true;enterApp();return;} // 일반 비번도 허용
   err.textContent='메인관리자 비밀번호가 올바르지 않습니다.';return;
 }
 if(pw==='wonikpne'){isAdmin=true;isSuper=false;enterApp();return;}
 if(pw==='yes@@231021'){isAdmin=true;isSuper=true;enterApp();return;} // 메인관리자 비번으로도 바로 로그인
 err.textContent='비밀번호가 올바르지 않습니다.';
}
function enterApp(){
 document.getElementById('login').classList.remove('on');
 document.getElementById('logoutBtn').style.display='';
 entered=false;csMode=false;
 render();applyShell();
}
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('loginPw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
// 로그인 화면 우측 상단 별표 3회 → 메인관리자 로그인 모드
var lStarClicks=0,lStarTimer=null;
document.getElementById('loginStar').onclick=function(){
 lStarClicks++;
 if(lStarTimer)clearTimeout(lStarTimer);
 lStarTimer=setTimeout(function(){lStarClicks=0;},1500);
 if(lStarClicks>=3){
   lStarClicks=0;clearTimeout(lStarTimer);
   superPending=true;updateLoginUI();
   var err=document.getElementById('loginErr');if(err){err.style.color='#4f46e5';err.textContent='메인관리자 모드 — 비밀번호를 입력하세요.';}
   var pw=document.getElementById('loginPw');if(pw){pw.value='';pw.focus();}
 }
};
document.getElementById('logoutBtn').onclick=function(){
 curTab='dash';dashFilter=null;
 document.getElementById('login').classList.remove('on');
 showLogin();
};

// ===== 부팅 (Firebase 공유 DB 동기화 완료 후 시작) =====
function __bootApp(){
 // Firebase에서 받은 데이터로 전역 재로딩(현재 SITE 기준). 미설정 시 기존 localStorage 그대로.
 try{ if(typeof loadSiteData==='function') loadSiteData(SITE); }catch(e){}
 // 현재 현장 데이터 1회 보존(데모 SEED 등 미저장 상태 방지) → Firebase 비어있으면 첫 기기가 시드 업로드
 if(localStorage.getItem(siteKey('tos_db_v4'))==null)persist();
 render();
 showLogin(); // 시작 시 로그인 화면 표시
}
if(window.FBSync&&typeof FBSync.boot==='function'){ FBSync.boot(__bootApp); }
else { __bootApp(); }
</script>
